<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>(* ̄ω ̄)ノ My Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="player">
  <div class="title-bar">
    <span> MUSIC.exe</span>
    <span class="dots"><span></span><span></span><span></span></span>
  </div>
  <div class="cover">
    <img class="pixel-cover" id="pixelCover" src="images/flower1.jpeg" alt="Album art">
  </div>
  <h2 class="song-title" id="songTitle">SONG TITLE</h2>
  <p class="song-artist" id="songArtist">Artist Name</p>
  <input type="range" id="progressBar" class="progress-bar" value="0" min="0" max="100" step="0.1">
  <div class="time-row">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>
  <div class="buttons">
    <button id="prevBtn" title="Previous">⏮</button>
    <button id="playBtn" title="Play/Pause">▶</button>
    <button id="nextBtn" title="Next">⏭</button>
  </div>
  <div class="volume-row">
    <span>🔊</span>
    <input type="range" id="volumeBar" min="0" max="100" value="70">
  </div>
  <div class="autoplay-row">
    <input type="checkbox" id="autoplayCheckbox" checked>
    <label for="autoplayCheckbox">autoplay next song (•ᴗ•)</label>
  </div>
  <div class="playlist" id="playlist"></div>
</div>
<audio id="audio"></audio>
<script src="script.js"></script>

</body>
</html>
